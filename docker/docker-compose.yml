services:
  mysql:
    image: mysql:9.0
    container_name: car-sales-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${DB_NAME:-car_sales}
      MYSQL_USER: ${DB_USER:-car_sales}
      MYSQL_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - mysql_data:/var/lib/mysql
      - ../backend/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD" || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    image: car-sales-backend:local
    container_name: car-sales-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-car_sales}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      DB_NAME: ${DB_NAME:-car_sales}
      FASTAPI_PORT: "8001"
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${BACKEND_PUBLISH_PORT:-8001}:8001"

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_GLOB_API_URL: ${VITE_GLOB_API_URL:-/api}
        VITE_APP_TITLE: ${VITE_APP_TITLE:-中国市场汽车销量}
        VITE_APP_NAMESPACE: ${VITE_APP_NAMESPACE:-vben-web-tdesign}
        VITE_APP_STORE_SECURE_KEY: ${VITE_APP_STORE_SECURE_KEY:-please-replace-me-with-your-own-key}
        VITE_ADMIN_REFRESH_CONFIRM_CODE: ${VITE_ADMIN_REFRESH_CONFIRM_CODE:-change-me}
    image: car-sales-frontend:local
    container_name: car-sales-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PUBLISH_PORT:-8081}:8080"

volumes:
  mysql_data:
